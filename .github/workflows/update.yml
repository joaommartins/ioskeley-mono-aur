name: Update AUR packages

on:
  pull_request:
    paths: ['**/PKGBUILD']
  push:
    branches: [main]
    paths: ['**/PKGBUILD']

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pkgbuilds:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Update pkgver and checksums for all packages
        run: |
          for dir in ttf-ioskeley-mono-*/; do
            echo "=== Updating ${dir} ==="
            PKGBUILD="${dir}PKGBUILD"

            TAG=$(grep "^_tag=" "$PKGBUILD" | cut -d"'" -f2)
            PKGVER=$(echo "${TAG}" | sed 's/^v//; s/-/./g')

            sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" "$PKGBUILD"
            sed -i "s/^pkgrel=.*/pkgrel=1/" "$PKGBUILD"

            # Extract the asset filename from the source URL
            ASSET=$(grep -oP 'download/\$\{_tag\}/\K[^"]+' "$PKGBUILD")
            BASE_URL="https://github.com/ahatem/IoskeleyMono/releases/download/${TAG}"

            if ! curl -sLf -o "/tmp/${ASSET}" "${BASE_URL}/${ASSET}"; then
              echo "::error::Failed to download ${ASSET} from ${TAG}"
              exit 1
            fi
            SHA=$(sha256sum "/tmp/${ASSET}" | cut -d' ' -f1)

            # Replace the sha256sums block
            awk -v sha="$SHA" '
              /^sha256sums=\(/ {
                print "sha256sums=("
                print "    \047" sha "\047"
                print "    \047SKIP\047"
                print ")"
                skip=1; next
              }
              skip && /^\)/ { skip=0; next }
              skip { next }
              { print }
            ' "$PKGBUILD" > "${PKGBUILD}.tmp" && mv "${PKGBUILD}.tmp" "$PKGBUILD"

            echo "Updated ${dir} -> pkgver=${PKGVER}, sha256=${SHA}"
          done

      - name: Commit changes to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/PKGBUILD'
          git diff --cached --quiet && exit 0
          git commit -m "Update pkgver and checksums"
          git push

